## PROGRAM DETAILS
details:
  about:
    title: "About this program"
    sub_title: |-
      This 6-week Applied AI course is built for professionals who want to leverage AI in their roles—not just explore it.
      You'll work hands-on with generative models such as GPT-4o, Gemini 2.5 (Google), Claude 4 (Anthropic), and modern image/video tools, applying them to real workflows.
      By the end of the course, you will have amplified your capacities with AI and be ready to confidently apply AI tools in your workflow.

    list:
      - label: "Duration"
        content: "6 Weeks"
        icon: "duration-icon"
      - label: "Classes"
        content: "2 live, online classes per week"
        icon: "book-2"
      - label: "Size of the Class"
        content: "12 people max"
        icon: "people"
      - label: "Certificate"
        content: "Official 4Geeks Completion Certificate, recognized by multiple institutions."
        icon: "certification"
      - label: "Requirements"
        content: "No previous experience is required"
        icon: "contract-checked"

  heading: "PROGRAM DETAILS"
  weeks: 6
  week_unit: "wks"
  facts:
    - label: "Duration"
      value: "6 weeks"
    - label: "Commitment"
      value: "2 live sessions each week, each session lasting 2 hours, totaling 24 hours"
    - label: "Certificate"
      content: "Multiple institutions recognize our certificates."
      link_text: "See example"
      link: "https://certificate.4geeks.com/44c61b294a248f91088f5355aea09606126795e3"
      icon: "certificate"
    - label: "Schedule"
      value: "Online / Remote"
    - label: "Class Size"
      value: "Up to 14 people"
    - label: "Total Hours"
      value: "24"
  sub_heading: "6-week course designed to help you leverage the power of AI in the workplace."
  left_labels:
    description: "DESCRIPTION:"
    projects: "PROJECTS:"
    duration: "DURATION:"
    skills: "Skills / Weeks:"
  details_modules:
    - module_name: "Intro to AI"
      title: "Introduction to AI"
      description: "Understand AI definitions, types of Artificial Intelligence and how it can benefit your career. Cover practical examples and key concepts like context, prompts, and models"
      projects: "Learn to identify opportunities to implement AI, understand challenges and risks, develop AI strategies, and create useful commands."
      slug: "intro-ai-workplace"
      duration: "week 1"
      step: 1
    - module_name: "Be More Productive"
      title: "Strategies for Improving Work Performance"
      description: "Compare AI and human capacities in various tasks, identify when to leverage AI, explore relevant prompts, optimize prompt engineering."
      projects: "Design a job-relevant workflow integrating AI."
      slug: "generation-strategies"
      duration: "week 2"
      step: 2
    - module_name: "Text Generation"
      title: "Text Generation"
      description: " Explore the capabilities of popular models like ChatGPT, Claude, and Llama-2. Learn to master prompt strategies, AI workflows, and tools to automate prompts."
      projects: "Review and debug prompts, learn to assess the quality of responses, and how to instruct a model effectively."
      slug: "text-generation"
      duration: "week 3"
      step: 3
    - module_name: "Image Generation"
      title: "Image Generation and AI Implementation"
      description: "Review the capabilities of popular models for image generation like Stable Diffusion, Dall-E, Midjourney. Optimize prompt engineering for image generation."
      projects: "Develop an AI strategy and create useful image generation prompts for specific use cases."
      slug: "img-generation"
      duration: "week 4"
      step: 4
    - module_name: "Tools and Future of AIs"
      title: "Tools and the Future of AI"
      description: "Evaluate Artificial Intelligence tools, work on hands- on projects using popular AI models and tools."
      projects: "Final project, assignments, and next steps..."
      slug: "final-project"
      duration: "week 5 & 6"
      step: 5

