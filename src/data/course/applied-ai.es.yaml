## PROGRAM DETAILS
details:
  about:
    title: "Sobre este programa"
    sub_title: |-
      Este curso de IA Aplicada de 6 semanas está diseñado para profesionales que quieren aprovechar la IA en sus roles, no solo explorarla.
      Trabajarás de forma práctica con modelos generativos como GPT-4o, Gemini 2.5 (Google), Claude 4 (Anthropic), y herramientas modernas de imagen/video, aplicándolas a flujos de trabajo reales.
      Al final del curso, habrás ampliado tus capacidades con IA y estarás listo para aplicar con confianza herramientas de IA en tu flujo de trabajo.
        
    list:
      - label: "Duración"
        content: "6 semanas"
        icon: "duration-icon"
      - label: "Clases"
        content: "2 clases en vivo y en línea por semana"
        icon: "book-2"
      - label: "Tamaño de la clase"
        content: "12 personas máx"
        icon: "people"
      - label: "Certificado"
        content: "Certificado de Finalización Oficial de 4Geeks, reconocido por múltiples instituciones."
        icon: "certification"
      - label: "Requisitos"
        content: "No se necesita experiencia previa"
        icon: "contract-checked"

  heading: "DETALLES DEL PROGRAMA"
  weeks: 6
  week_unit: "sem"
  facts:
    - label: "Duración"
      value: "6 semanas"
    - label: "Compromiso"
      value: "2 sesiones en vivo cada semana, cada sesión de 2 horas, totalizando 24 horas"
    - label: "Certificado"
      content: "Nuestros certificados son reconocidos por múltiples instituciones."
      link_text: "Ver ejemplo"
      link: "https://certificate.4geeks.com/44c61b294a248f91088f5355aea09606126795e3"
      icon: "certificate"
    - label: "Horario"
      value: "En línea / Remoto"
    - label: "Tamaño Clase"
      value: "Hasta 14 personas"
    - label: "Horas totales"
      value: "24"
  sub_heading: "Curso de 6 semanas diseñado para ayudarte a aprovechar el poder de la IA en el lugar de trabajo."
  left_labels:
    description: "DESCRIPCIÓN:"
    projects: "PROYECTOS:"
    duration: "DURACIÓN:"
    skills: "Habilidades / Semanas:"
  details_modules:
    - module_name: "Intro to AI"
      title: "Introducción a la IA"
      description: "Comprende las definiciones de IA, tipos de Inteligencia Artificial y cómo puede beneficiar tu carrera. Cubre ejemplos prácticos y conceptos clave como contexto, prompts y modelos."
      projects: "Aprende a identificar oportunidades para implementar IA, comprende desafíos y riesgos, desarrolla estrategias de IA y crea comandos útiles."
      slug: "intro-ai-workplace"
      duration: "semana 1"
      step: 1
    - module_name: "Be More Productive"
      title: "Estrategias para Mejorar el Rendimiento Laboral"
      description: "Compara las capacidades de IA y humanas en diversas tareas, identifica cuándo aprovechar la IA, explora prompts relevantes, optimiza la ingeniería de prompts."
      projects: "Diseña un flujo de trabajo relevante para tu trabajo integrando IA."
      slug: "generation-strategies"
      duration: "semana 2"
      step: 2
    - module_name: "Text Generation"
      title: "Generación de Texto"
      description: "Explora las capacidades de modelos populares como ChatGPT, Claude y Llama-2. Aprende a dominar estrategias de prompts, flujos de trabajo de IA y herramientas para automatizar prompts."
      projects: "Revisa y depura prompts, aprende a evaluar la calidad de las respuestas y cómo instruir a un modelo de manera efectiva."
      slug: "text-generation"
      duration: "semana 3"
      step: 3
    - module_name: "Image Generation"
      title: "Generación de Imágenes e Implementación de IA"
      description: "Revisa las capacidades de modelos populares para generación de imágenes como Stable Diffusion, Dall-E, Midjourney. Optimiza la ingeniería de prompts para generación de imágenes."
      projects: "Desarrolla una estrategia de IA y crea prompts útiles para generación de imágenes para casos de uso específicos."
      slug: "img-generation"
      duration: "semana 4"
      step: 4
    - module_name: "Tools and Future of AIs"
      title: "Herramientas y el Futuro de la IA"
      description: "Evalúa herramientas de Inteligencia Artificial, trabaja en proyectos prácticos utilizando modelos y herramientas de IA populares."
      projects: "Proyecto final, tareas y próximos pasos..."
      slug: "final-project"
      duration: "semanas 5 y 6"
      step: 5



