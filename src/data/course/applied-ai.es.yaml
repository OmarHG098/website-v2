## TWO COLUMNS
two_columns:
  proportions: [6, 6]
  image:
    style: '{"backgroundSize": "contain", "background-position": "center"}'
    src: "../../images/landing/applied-ai-icons.webp"
    shadow: false
  heading:
    text: "¡Expande tus capacidades y aumenta tu eficiencia!"
    font_size: ["30px", "30px", "30px", "26px", "24px"]
  sub_heading:
    text: |-
      En el curso, aprenderás a sacar el máximo provecho de los modelos generativos basados en texto, como ChatGPT, Gemini, Perplexity y Claude.

      Además, explorarás herramientas de generación de imágenes como Midjourney, Stable Diffusion y Open source colabs. 
      También, te sumergirás en el mundo de la inteligencia artificial aplicada a video con Stable Video, y en el ámbito del audio con Whisper y ElevenLabs. 
      ¡Prepárate para dominar estas potentes herramientas AI y llevar tus habilidades al siguiente nivel!
    font_size: ["16px", "16px", "16px", "16px", "16px"]
  button:
    text: "Aplicar al programa"
    color: "white"
    background: "black"
    path: "#prices_and_payment"


