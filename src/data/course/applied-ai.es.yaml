## PROGRAM DETAILS
details:
  about:
    title: "Sobre este programa"
    sub_title: |
      Este curso de inteligencia artificial está diseñado para quienes buscan integrar la inteligencia artificial (IA) en sus trabajos y roles actuales. A lo largo de seis semanas, los participantes obtendrán una comprensión integral de la IA y sus aplicaciones prácticas en diversas industrias.
      El curso abarca conceptos esenciales como definiciones de IA, beneficios en el entorno laboral y elementos clave como Contexto, Prompts y Modelos. Los participantes aprenderán a identificar oportunidades para implementar IA, superar desafíos, desarrollar estrategias efectivas de IA y crear comandos prácticos.
        
    list:
      - label: "Duración"
        content: "6 semanas"
        icon: "duration-icon"
      - label: "Clases"
        content: "2 clases semanales"
        icon: "book-2"
      - label: "Tamaño de la clase"
        content: "12 personas máx"
        icon: "people"
      - label: "Certificado"
        content: "Nuestros certificados están reconocidos por múltiples instituciones."
        icon: "certification"
      - label: "Requisitos"
        content: "No se necesita experiencia previa"
        icon: "contract-checked"

  heading: "DETALLES DEL PROGRAMA"
  weeks: 6
  week_unit: "sem"
  facts:
    - label: "Duración"
      value: "6 semanas"
    - label: "Compromiso"
      value: "2 sesiones en vivo cada semana, cada sesión de 2 horas, totalizando 24 horas"
    - label: "Certificado"
      content: "Nuestros certificados son reconocidos por múltiples instituciones."
      link_text: "Ver ejemplo"
      link: "https://certificate.4geeks.com/44c61b294a248f91088f5355aea09606126795e3"
      icon: "certificate"
    - label: "Horario"
      value: "En línea / Remoto"
    - label: "Tamaño Clase"
      value: "Hasta 14 personas"
    - label: "Horas totales"
      value: "24"
  sub_heading: "Curso de 6 semanas para profesionales que desean incorporar la IA en sus roles laborales."
  left_labels:
    description: "DESCRIPCIÓN:"
    projects: "PROYECTOS:"
    duration: "DURACIÓN:"
    skills: "Habilidades / Semanas:"
  details_modules:
    - module_name: "Intro. al AI"
      title: "Intro. al AI"
      description: "Definiciones de IA, beneficios en el entorno laboral, tipos de Inteligencia Artificial con ejemplos prácticos, y conceptos clave como Contexto, Prompts y Modelos."
      projects: "Identificación de oportunidades para implementar IA, comprensión de desafíos y riesgos, desarrollo de estrategias de IA y creación de comandos útiles."
      slug: "intro-ai-workplace"
      duration: "1 semana"
      step: 1
    - module_name: "Sé más productivo"
      title: "Estrategias para Mejorar el Rendimiento Laboral"
      description: "Comparación entre la IA y los humanos en diversas tareas, cuándo utilizar la Inteligencia Artificial, ejemplos de prompts relacionados con los campos de los estudiantes, y consejos de Ingeniería de Prompts."
      projects: "Creación de flujos de trabajo para profesiones como profesores, lingüistas y desarrolladores."
      slug: "generation-estrategies"
      duration: "1 semana"
      step: 2
    - module_name: "Generación de Texto"
      title: "Generación de Texto"
      description: "Capacidades de modelos populares como ChatGPT, Claude y Llama-2. Explicación detallada de estrategias de prompts, flujos de trabajo de IA y herramientas para automatizar prompts."
      projects: "Revisión y depuración de prompts, cómo evaluar si una respuesta de modelo es buena y cómo instruir correctamente a un modelo de enfoques."
      slug: "text-generation"
      duration: "2 semanas"
      step: 3
    - module_name: "Generación de Imágenes"
      title: "Generación de Imágenes e Implementación de IA"
      description: "Revisión de capacidades de modelos populares para generación de imágenes como Stable Diffusion, Dall-E, Entre otras, A demás de cómo redactar buenos prompts para modelos de generación de imágenes."
      projects: "Desarrollo de una estrategia de Inteligencia Artificial y creación de prompts útiles para generar imágenes en casos de uso específicos."
      slug: "img-generation"
      duration: "1 semana"
      step: 4
    - module_name: "IA: Herramientas y Futuro"
      title: "Herramientas y el Futuro de las IAs"
      description: "Evaluación de herramientas de Inteligencia Artificial, proyectos prácticos utilizando herramientas populares."
      projects: "Graduación del curso, preguntas finales, tareas y próximos pasos..."
      slug: "final-project"
      duration: "1 semana"
      step: 5



