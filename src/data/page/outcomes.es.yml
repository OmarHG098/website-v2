      - title: "Soporte Impulsado por IA:"
        content: "Retroalimentación personalizada de código 24/7 y herramientas de desarrollo profesional"
      - title: "Más de 5,000 Empresas Asociadas:"
        content: "Una red global de empresas que confían y contratan a graduados de 4Geeks"

  - title: "🏆 Reconocidos, Calificados y Recomendados"
    ref: "recognition"
    paragraph: |
          <ul class='ul-outcomes'>
            <li class='li-outcomes-link'>Nombrados <strong style="font-weight: 800;">Top 5 Coding Bootcamp</strong> por Forbes</li>
            <li class='li-outcomes-link'>Calificados <strong style="font-weight: 800;">4.9/5</strong> en SwitchUp, Course Report y Career Karma</li>
