header:
  title: "Resultados Comprobados que Impulsan Carreras Tech"
  paragraph: "En 4Geeks, el éxito no es una promesa — es un historial comprobado. Nuestros estudiantes lanzan carreras tech exitosas en programación impulsada por IA, ciencia de datos y ciberseguridad, y los números lo demuestran. Sigue leyendo para ver los detalles: Mantenemos nuestra información transparente, publicando regularmente datos verificados de colocación y salarios en EE. UU., América Latina y Europa."
  image: " "
  image_alt: "Informe de Resultados de 4Geeks Academy"
sections:
  - title: "🌎 El Panorama Global"
    ref: "global_picture"
    paragraph: |
      Tu carrera no debería depender de un año o una tendencia del mercado. En 4Geeks, hemos ayudado a miles de graduados a lanzar carreras tech exitosas en todo el mundo. Incluso en los mercados cambiantes de hoy, nuestros bootcamps demuestran su efectividad.
    sub_sections:
      - title: "RESULTADOS EN EE. UU."
        content: |
          <ul class='ul-outcomes'>
            <li class='li-outcomes-link'>EE. UU. (Referencia 2022): 84% contratados | +55% aumento salarial</li>
            <li class='li-outcomes-link'>(2024): Un año de mercado más lento — la contratación promedio tomó 141 días.</li>
            <li class='li-outcomes-link'>(Mediados de 2025): Repunte en pleno apogeo — 86% contratados | +71% aumento salarial | contratación promedio en solo 93 días.</li>
          </ul>
      - title: "RESULTADOS EN LATAM"
        content: |
          <ul class='ul-outcomes'>
            <li class='li-outcomes-link'>(2024): 86% contratados | +233% aumento salarial | 111 días para contratar</li>
            <li class='li-outcomes-link'>(Mediados de 2025): Contrataciones más rápidas (91 días) | +282% aumento salarial.</li>
          </ul>
      - title: "RESULTADOS EN ESPAÑA"
        content: |
          <ul class='ul-outcomes'>
            <li class='li-outcomes-link'>(2024): 85% de los buscadores de empleo contratados | +30% aumento salarial | 128 días para contratar</li>
            <li class='li-outcomes-link'>(Mediados de 2025): Mercado más frío, pero los graduados siguen siendo contratados en un promedio de 92 días.</li>
          </ul>
      - title: "📌 Conclusión:"
        content: "Incluso cuando los mercados se contraen, los graduados de 4Geeks siguen siendo contratados. Y cuando las condiciones mejoran, son contratados más rápido y ven mayores aumentos salariales."

  - title: "📊 Resultados en Números"
    ref: "outcomes_numbers"
    paragraph: " "
    stats: 
      - stat: "84%"
        content: "de graduados en EE. UU. contratados en 6 meses"
