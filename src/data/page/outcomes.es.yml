          <ul class='ul-outcomes'>
            <li class='li-outcomes-link'>Inscríbete con la Garantía de Empleo</li>
            <li class='li-outcomes-link'>Comienza el programa y completa las tareas</li>
            <li class='li-outcomes-link'>Ten buena asistencia y termina tu proyecto final</li>
            <li class='li-outcomes-link'>Participa completamente en el apoyo profesional GeekFORCE</li>
          </ul>
          <br>
          <br>
          <p>Sigue estos simples pasos, y si no consigues trabajo, recibirás el 100% de tu matrícula de vuelta. Estamos tan seguros de la efectividad de nuestro programa.</p>
          <br>
          <br>
          <p>👉 <a target='_blank' nofollow noreferrer noopener href='/es/garantia-de-trabajo'>Aprende más sobre la Garantía de Empleo</a></p>
