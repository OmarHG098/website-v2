    ref: "job_guarantee"
    paragraph: 'Sabemos que nuestros bootcamps dan resultados y creemos en tu potencial. Por eso ofrecemos una <strong style="font-weight: 800;">Garantía de Empleo</strong> opcional: Consigue trabajo dentro de los 9 meses posteriores a la graduación, o te reembolsamos el 100% de tu matrícula. *No aplica para todos los mercados, países o estados donde opera 4Geeks. <a href="https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guaranteee-es.pdf" target="_blank" rel="noopener noreferrer">Condiciones aplican</a>.'
