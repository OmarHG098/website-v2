    sub_heading:
      text: |
        ¿La prueba más fuerte de que creemos en nuestro modelo? Lo respaldamos con una Garantía de Empleo. *No aplica para todos los mercados, países o estados donde opera 4Geeks. <a href="https://storage.googleapis.com/4geeks-academy-website/PDF%20and%20Docs/job-guaranteee-es.pdf" target="_blank" rel="noopener noreferrer">Condiciones aplican</a>.
        La mayoría de escuelas prometen "apoyo de carrera." En 4Geeks, prometemos resultados: consigue trabajo en 9 meses, o te reembolsamos tu matrícula en su totalidad.
        Podemos hacer esto porque:
      font_size: ["16px", "16px", "16px", "16px", "16px"]
