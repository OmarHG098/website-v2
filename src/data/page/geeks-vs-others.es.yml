## 4GEEKS VS OTHERS HEADING
seo_title: "Por qué 4Geeks se Destaca"
header:
  title: "4Geeks Academy vs Otros Bootcamps"
  sub_title: " "
  paragraph: "Descubre por qué 4Geeks Academy es diferente. Nuestro plan de estudios integrado con IA, proyectos prácticos y mentoría personalizada ayudan a los estudiantes a lanzar carreras tecnológicas de alta demanda y preparadas para el futuro, sin experiencia previa necesaria. Con mentoría de por vida y apoyo profesional, nos aseguramos de que sigas prosperando mucho después de graduarte."

section_heading: 
  text: "Lanzando Carreras Tecnológicas Exitosas en la Era de la IA"
  sub_heading: "Ayudando a los estudiantes a construir carreras tecnológicas duraderas es nuestra misión. Desde un plan de estudios alineado con la industria y preparado para el futuro hasta un sistema de apoyo de por vida, aquí es cómo superamos a la competencia:"

components:
  - name: hyperpersonalized_learning
    position: 1
    layout: two_column_left
    proportions: [6, 6]
    background: "#F4F9FF"
    justify: "center"
    image:
      style: '{"backgroundSize": "contain", "background-position": "center"}'
      src: "/images/landing/hombre-joven-con-laptop-senalando.webp"
      shadow: false
    section_heading:
      text: ""
    heading:
      text: "Aprendizaje Hiperpersonalizado y Apoyo que Dura Toda la Vida"
      font_size: ["33px", "33px", "33px", "33px", "33px"]
      style: '{ "lineHeight": "30px" }'
    sub_heading:
      text: "La mayoría de bootcamps te dan unas pocas horas de mentoría y recursos genéricos, y luego te dejan solo. En 4Geeks, construimos todo un sistema de apoyo alrededor de la personalización:"
      font_size: ["16px", "16px", "16px", "16px", "16px"]
      style: '{ "font-size":"16px", "margin":"15px 0", "font-weight":"600" }'
    content:
      style: '{ "font-size":"16px", "margin":"15px 0", "font-weight":"600"}'
      text: "👉 El resultado: una experiencia verdaderamente hiperpersonalizada que combina mentoría humana con inteligencia de IA, algo que ningún otro bootcamp ofrece."
    bullets:
      item_style: '{ "padding": "10px 0", "font-weight": "100", "margin":"0" }'
      items:
        - heading: "Mentoría 1:1 Ilimitada con Humanos Reales"
          text: |
           Obtén toda la orientación personal que necesites, de por vida. Desde depurar código hasta prepararte para un rol senior años después, nuestros mentores siempre están a solo un mensaje de distancia.
          icon: "check"
          icon_color: "#F4F9FF"
        - heading: "Seguimiento de Progreso y Retroalimentación con IA"
          text: |
            Rigobot + LearnPack se adaptan a tu estilo de aprendizaje, dando retroalimentación instantánea, ayudándote a depurar más rápido y rastreando tu crecimiento de habilidades a lo largo del tiempo. Nunca te quedarás preguntándote dónde te encuentras.
          icon: "check"
          icon_color: "#F4F9FF"
        - heading: "Apoyo de Carrera que Crece Contigo"
          text: |
            GeekFORCE no es solo para tu primer trabajo. Es coaching de carrera personalizado y continuo al que puedes recurrir una y otra vez, ya sea que estés cambiando de roles, trabajando como freelancer o ascendiendo a liderazgo.
          icon: "check"
          icon_color: "#F4F9FF"

