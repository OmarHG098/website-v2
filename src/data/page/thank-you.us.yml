content:
  title: "Congratulations! You just took the first step toward your tech career!"
  message: "A confirmation email is on its way, and our Admissions Team is already reviewing your application. \nTo keep your momentum going, the best next step is to book a call with an Admissions Advisor. \nThey’ll be happy to answer your questions, offer personalized guidance, and help you choose the path that best fits your goals."

    
  articles_title: " "
