components:
    - name: first
      position: 1
      proportions: [6, 6]
      layout: two_column_left
      image:
        style: '{ "backgroundSize": "contain", "background-position": "center" }'
        src: "/images/landing/hombre-joven-con-laptop-senalando.webp"
        shadow: false
      heading:
        text: "Unlimited Mentorship & Career Support for Tech Success"
        font_size: ["33px", "33px", "33px", "33px", "33px"]
        style: '{ "lineHeight": "30px" }'
      bullets:
        items:
          - heading: "Geekpal"
            text: |
              Unlimited 1:1 Mentorship
              <br />
              Weekly study halls and as many 1-on-1 sessions as you need. Our expert mentors are always here to help you tackle coding challenges, big or small.
            icon: "check"
            icon_color: "#25BF6C"
          - heading: "Geekforce"
            text: |
              Lifetime Career Support
              <br />
              From optimizing your CV, LinkedIn, GitHub, and portfolio to tailored mock interviews, our career experts provide personalized guidance to help you launch your career—even after you’ve landed your first job.
            icon: "check"
            icon_color: "#25BF6C"
          - heading: "Slack Channels"
            text: |
              Join Our Global Community
              <br />
              Be part of a supportive network of over 6,100 people worldwide. Share advice, get feedback, and grow together in dedicated channels you can access from day one to forever.
            icon: "check"
            icon_color: "#25BF6C"

    - name: second
      position: 5
      proportions: [5, 7]
      layout: two_column_left
      image:
        style: '{ "backgroundSize": "contain", "background-position": "center" }'
        src: "/images/landing/community-support-2.webp"
        shadow: false
      heading:
        text: "Your 24/7 Learning Hub and AI Coding Assistance"
        font_size: ["33px", "33px", "33px", "33px", "33px"]
        style: '{ "lineHeight": "30px" }'
      bullets:
        items:
          - heading: "4Geeks.com"
            text: |
              Your Learning Hub
              <br />
              Access additional resources to accelerate your growth, including live events, interactive exercises, and a wealth of coding tools designed for every skill level.
            icon: "check"
            icon_color: "#25BF6C"
          - heading: "Rigobot"
            text: |
              Your AI Coding Assistant
              <br />
              Whether you’re debugging code, tracking your progress with skill evaluations, or looking for instant tutoring, Rigobot has you covered 24/7. Our expert AI assistant ensures you stay on track and solve challenges faster, no matter the time of day.
            icon: "check"
            icon_color: "#25BF6C"

    - name: third
      position: 3
      proportions: [6, 6]
      layout: two_column_right
      image:
        style: '{ "backgroundSize": "contain", "background-position": "center" }'
        src: "/images/landing/reservation-es.webp"
        shadow: false
      heading:
        text: "Making Tech Careers Accessible"
        font_size: ["33px", "33px", "33px", "33px", "33px"]
        style: '{ "lineHeight": "30px" }'
      sub_heading:
        text: "At 4Geeks Academy, we believe a tech career should be within everyone’s reach. Our programs are designed to meet real-world needs, with financial options to ensure you can join our bootcamp stress-free."
        font_size: ["16px", "16px", "16px", "16px", "16px"]
        style: '{ "font-size": "16px", "margin": "15px 0", "font-weight": "600" }'
      bullets:
        items:
          - heading: "Full and partial scholarships for qualifying applicants."
            text: "Unlock your future with scholarships designed to make tech education accessible. Apply now and take advantage of financial support to jumpstart your career in technology."
            icon: "check"
          - heading: "Flexible financing and loan options, starting as low as $150/month."
            text: "Choose from a variety of flexible payment plans and financing options to fit your budget. Start your journey in tech with affordable monthly payments and no financial stress."
            icon: "check"
      button:
        text: "Get More Info"
        color: "white"
        background: "black"
        path: "#leadform_bottom"

    - name: how-it-works
      position: 10
      background: "#0084FF"
      layout: iconogram
      swipable: true
      heading:
        text: "Do our Bootcamps Deliver Results You Can Count On?"
        font_size: ["30px", "30px", "30px", "30px", "30px"]
        style: '{ "color": "white" }'
      sub_heading:
        text: 'Yes — and we’ve got the numbers to back it up.'
        font_size: ["20px", "20px", "16px", "16px", "16px"]
        style: '{ "textAlign": "center", "width": "60%", "color": "white"}'      
      icons:
        - icon: "graduation-2"
          color: "#0084FF"
          title: "Job Placement Rate"
          content: "84% of graduates were hired"
        - icon: "briefcase-2"
          color: "#FF0000"
          title: "Avergage time to get hired"
          content: "3-6 months after graduation"
        - icon: "stairswflag"
          color: "#BE8BFF"
          title: "Salary Increase"
          content: "55% higher at new job"