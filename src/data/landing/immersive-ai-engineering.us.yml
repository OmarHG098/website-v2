components:
  - name: leadform_header
    position: 1
    layout: two_column_left
    proportions: [5, 7]
    image:
      style: '{ "backgroundSize": "contain", "width": "auto"}'
      src: "/images/landing/hombre-con-laptop.png"
    heading:
      text: "Why This Program Now"
      font_size: ["34px", "34px", "34px", "25px", "25px"]
    sub_heading:
      text: "Companies urgently need engineers who can orchestrate AI systems, automate workflows, and transform operations with AI tools. Most programs teach isolated skills through disconnected projects. We train you to turn one complete business into an AI-native operation—across frontend, backend, data, automation, and agents."
      font_size: ["16px", "16px", "16px", "14px", "14px"]
      style: '{ "font-weight": "100" }'
    button:
      text: "Apply Now"
      color: "white"
      background: "black"
      path: "#leadform_header"
    bullets:
      items:
        - text: "• 3.5M AI engineering jobs projected by 2026"
        - text: "• 47% YoY growth in AI job postings"
        - text: "• 30–50% salary premium vs traditional developers"

  - name: about-program
    position: 4
    layout: two_column_left
    proportions: [6, 6]
    background: "#ffffff"
    image:
      style: '{ "backgroundSize": "contain", "width": "auto"}'
      src: "/images/landing/two-womans-and-laptop.webp"
      shadow: false
    heading:
      text: "This Is Not Exploration — It's Career Transformation"
      font_size: ["40px", "34px", "34px", "25px", "25px"]
    sub_heading:
      text: "This AI Engineering program is designed for professionals ready to commit 20–24 hours per week for 20 weeks (evening classes + dedicated homework) and who want to make a real career shift. <b>Is The Program Right for You? You're a strong fit if you are:</b>"
      font_size: ["16px", "16px", "16px", "14px", "14px"]
      style: '{ "font-weight": "100" }'
    content:
      text: "By graduation, you'll have built an end-to-end AI-powered company and be ready to launch the next stage of your career."
      font_size: ["16px", "16px", "16px", "14px", "14px"]
    bullets:
      items:
        - text: "• Ready for intensive learning: Evening classes + 10–15 hours of homework per week"
        - text: "• Focused on career impact: Want AI-native skills that open high-demand, high-paying roles"
        - text: "• Motivated by structure: Prefer clear milestones, expert guidance, and a cohort that keeps you accountable"
        - text: "• Prepared to invest in yourself: Financing options and limited scholarships available"
    button:
      text: "Learn More"
      color: "white"
      background: "black"
      path: "#leadform_header"

