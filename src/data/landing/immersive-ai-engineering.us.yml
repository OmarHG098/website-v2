      font_size: ["16px", "16px", "16px", "14px", "14px"]
      style: '{ "font-weight": "100" }'
      text: "Master what it takes to build and scale an entire AI-native business, not just individual features. Every milestone builds on the last, giving you real end-to-end engineering experience:"
    bullets:
      items:
        - text: "<b>AI-Assisted Frontend:</b> Modern React application with AI-powered components"
        - text: "<b>Production Backend:</b> REST APIs, authentication, serverless functions"
        - text: "<b>Data Systems:</b> Telemetry, pipelines, automated reporting"
        - text: "<b>RAG Knowledge Layer:</b> Vector search, embeddings, contextual document retrieval"
        - text: "<b>Multi-Agent Systems:</b> Intelligent agents with memory, task routing, and tool calling"
        - text: "<b>Workflow Automation:</b> AI-generated processes deployed via n8n, queues, and scheduled tasks"
        - text: "<b>Real-Time Systems:</b> WebSockets, streaming AI responses, event-driven architecture"
    content:
      text: "<b>The Impact of One Continuous Project</b><br><br>You'll graduate ready to orchestrate complete AI systems and leverage AI tools for maximum impact, the skills that define the next decade of software engineering."
      font_size: ["16px", "16px", "16px", "14px", "14px"]
    button:
